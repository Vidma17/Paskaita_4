<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>Sveiki!</title>
        <link rel="stylesheet" href="styles/style_1.css">
    </head>
    <body>
        <header>
            <h1>LOGO</h1>
            <nav>
                <ul>
                    <li>Home</li>
                    <li>About</li>
                    <li>Contact</li>
                </ul>
            </nav>
        </header>
        <main>
            <!-- kortele su vardu ir aprasymu -->
            <form class="pirma-forma" action="#">
                <h3>Billing Details</h3>
                <input class="plotis-43" type="text" placeholder="First name">
                <input class="plotis-43" type="text" placeholder="Last name">
                <input class="plotis-88" type="text" placeholder="Address line 1">
                <input class="plotis-88" type="text" placeholder="Address line 2">
                <input class="plotis-43" type="text" placeholder="Town/city">
                <input class="plotis-43" type="number" placeholder="Postcode">
                <input class="plotis-43" type="tel" placeholder="Contact no">
                <input class="plotis-43" type="email" placeholder="Email address">
                <input class="mygtukai" type="submit" value="Siųsti">
            </form>
            <form class="antra-forma" action="#">
                <h3>Ship to different address</h3>
                <input class="plotis-43" type="text" placeholder="First name">
                <input class="plotis-43" type="text" placeholder="Last name">
                <input class="plotis-88" type="text" placeholder="Address line 1">
                <input class="plotis-88" type="text" placeholder="Address line 2">
                <input class="plotis-43" type="text" placeholder="Town/city">
                <input class="plotis-43" type="number" placeholder="Postcode">
                <input class="mygtukai" type="submit" value="Siųsti">
            </form>
        </main>
        <footer>
            <p>Copyright, 2022</p>
        </footer>
    </body>
</html>
